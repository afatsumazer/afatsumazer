<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pembuat Tiket Resmi</title>
    <script src="https://jsdelivr.net"></script>
    <script src="https://cloudflare.com"></script>
    <script src="https://cloudflare.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Buat Tiket Resmi</h1>
            <p class="text-sm text-gray-500">Koneksi Database Aktif</p>
        </div>

        <form id="ticketForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Lengkap</label>
                <input type="text" id="userName" required placeholder="Nama Pengunjung" class="w-full px-4 py-2 border rounded-lg">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Event</label>
                <input type="text" id="eventName" required placeholder="Nama Acara" class="w-full px-4 py-2 border rounded-lg">
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg">
                Generate & Simpan ke Server
            </button>
        </form>

        <!-- Preview Tiket -->
        <div id="ticketResult" class="hidden mt-8 border-t-2 border-dashed border-gray-200 pt-6">
            <div class="bg-gradient-to-r from-blue-500 to-indigo-600 p-4 rounded-t-xl text-white text-center">
                <h3 id="resEvent" class="font-bold text-lg">Event</h3>
            </div>
            <div class="bg-gray-50 p-4 rounded-b-xl border relative">
                <div class="space-y-2 text-sm text-gray-700">
                    <p><strong>Nama:</strong> <span id="resName">-</span></p>
                    <p class="text-xs text-gray-400 font-mono break-all"><strong>ID Tiket:</strong> <span id="resID">-</span></p>
                </div>
                <div class="flex justify-center my-4">
                    <canvas id="qrcodeCanvas" class="bg-white p-2 rounded shadow-sm"></canvas>
                </div>
                <button id="downloadPdfBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2 rounded-lg text-sm">
                    Download E-Tiket (PDF)
                </button>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        let globalTicketData = null; // Menyimpan respons dari server

        document.getElementById('ticketForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const nama = document.getElementById('userName').value;
            const event = document.getElementById('eventName').value;

            try {
                // 1. Kirim data ke API server untuk didaftarkan ke database
                const response = await fetch('/api/generate-ticket', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nama, event })
                });

                globalTicketData = await response.json();

                // 2. Tampilkan hasil di halaman web
                document.getElementById('resName').innerText = globalTicketData.nama;
                document.getElementById('resEvent').innerText = globalTicketData.event;
                document.getElementById('resID').innerText = globalTicketData.id;

                // 3. Render QR Code berisi URL Link untuk Validasi
                const domainWeb = window.location.origin; // Otomatis mengambil domain web Anda (misal: https://webtiketmu.com)
                const qrContent = `${domainWeb}/scanner.html?id=${globalTicketData.id}&sig=${globalTicketData.sig}`;
                
                QRCode.toCanvas(canvas, qrContent, { width: 140, margin: 1 });
                document.getElementById('ticketResult').classList.remove('hidden');

            } catch (err) {
                alert("Gagal terhubung ke server database!");
            }
        });

        // 4. Cetak PDF
        document.getElementById('downloadPdfBtn').onclick = function() {
            if (!globalTicketData) return;
            const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [100, 150] });
            const canvas = document.getElementById('qrcodeCanvas');

            pdf.setFillColor(37, 99, 235);
            pdf.rect(0, 0, 100, 30, 'F');
            pdf.setTextColor(255, 255, 255);
            pdf.setFont("helvetica", "bold");
            pdf.setFontSize(14);
            pdf.text(globalTicketData.event.substring(0, 25), 5, 15);

            pdf.setTextColor(40, 40, 40);
            pdf.setFont("helvetica", "normal");
            pdf.setFontSize(10);
            pdf.text(`Nama Pemegang:`, 10, 45);
            pdf.setFont("helvetica", "bold");
            pdf.text(globalTicketData.nama, 10, 52);

            pdf.setFont("helvetica", "normal");
            pdf.text(`ID TIKET RESMI:`, 10, 65);
            pdf.setFont("helvetica", "bold");
            pdf.text(globalTicketData.id, 10, 72);

            const qrImgData = canvas.toDataURL('image/png');
            pdf.addImage(qrImgData, 'PNG', 30, 85, 40, 40);
            pdf.save(`Tiket-${globalTicketData.id}.pdf`);
        };
    </script>
</body>
</html>
