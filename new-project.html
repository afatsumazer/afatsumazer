<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tambah Project</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f5f5f5;
    margin:0;
}

.container{
    max-width:600px;
    margin:30px auto;
    background:#fff;
    padding:20px;
    border-radius:10px;
}

input,textarea{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ddd;
    border-radius:6px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:6px;
    background:#2196F3;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1976D2;
}

#status{
    margin-top:15px;
    color:green;
}
</style>
</head>
<body>

<div class="container">

<h2>Tambah Project</h2>

<input type="text" id="title" placeholder="Judul Project">

<textarea id="description"
placeholder="Deskripsi"
rows="6"></textarea>

<button id="saveBtn">
Simpan Project
</button>

<p id="status"></p>

</div>

<script type="module" src="../firebase-config.js"></script>
<script type="module" src="new-project.js"></script>

</body>
</html>
