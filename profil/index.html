<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Pengguna - AppSaya</title>
    <!-- Menggunakan Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen p-6">

    <div class="max-w-xl mx-auto space-y-6">
        <!-- Tombol Kembali ke Dashboard Utama -->
        <a href="../dashboard.html" class="inline-flex items-center gap-2 text-xs text-indigo-600 font-semibold hover:underline">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
            </svg>
            Kembali ke Dashboard
        </a>

        <!-- Kartu Profil Pengguna -->
        <div class="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden">
            <!-- Banner Minimalis -->
            <div class="h-24 bg-gradient-to-r from-indigo-800 to-indigo-950"></div>
            
            <div class="p-6 relative text-center">
                <!-- Avatar Profil -->
                <div class="relative -mt-16 mb-4 flex justify-center">
                    <img id="other-profile-avatar" src="https://via.placeholder.com/150" alt="Avatar" class="w-20 h-20 rounded-full border-4 border-white object-cover shadow-md bg-white">
                </div>

                <!-- Informasi Dasar Pengguna -->
                <h3 id="other-profile-name" class="text-lg font-bold text-gray-900">Memuat nama...</h3>
                <p id="other-profile-username" class="text-xs text-gray-500 mt-0.5">@username</p>
                <p id="other-profile-role" class="text-xs text-indigo-700 bg-indigo-50 font-semibold inline-block px-2.5 py-0.5 rounded-full mt-2">Member</p>
                <p id="other-profile-email" class="text-xs text-gray-400 mt-1"></p>

                <!-- Tombol Interaksi -->
                <div class="mt-4 flex justify-center space-x-2">
                    <button id="btn-follow" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition">
                        Ikuti
                    </button>
                    <button onclick="openMessageModal()" class="border border-gray-300 text-gray-700 hover:bg-gray-50 text-xs font-semibold px-4 py-2 rounded-lg transition">
                        Kirim Pesan
                    </button>
                </div>

                <!-- Statistik Pengikut & Diikuti (Bisa Diklik) -->
                <div class="flex justify-center gap-8 mt-6 pt-6 border-t border-gray-100 text-xs text-gray-600">
                    <div onclick="showFollowersList()" class="cursor-pointer hover:opacity-80 transition text-center">
                        <span id="other-followers-count" class="block font-bold text-gray-900 text-sm">0</span>
                        <span>Pengikut</span>
                    </div>
                    <div onclick="showFollowingList()" class="cursor-pointer hover:opacity-80 transition text-center">
                        <span id="other-following-count" class="block font-bold text-gray-900 text-sm">0</span>
                        <span>Diikuti</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Berkas yang Dibagikan -->
        <div>
            <h4 class="text-xs font-bold text-gray-700 uppercase tracking-wider mb-3">Berkas yang Dibagikan</h4>
            <div id="other-profile-shared-files" class="bg-white rounded-xl border border-gray-200 shadow-sm divide-y divide-gray-150">
                <!-- Data berkas dimuat otomatis -->
            </div>
        </div>
    </div>

    <!-- === MODAL DAFTAR USER (FOLLOWERS/FOLLOWING) === -->
    <div id="relations-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-lg max-w-sm w-full overflow-hidden">
            <div class="p-4 bg-indigo-900 text-white flex justify-between items-center">
                <h3 id="relations-modal-title" class="text-sm font-bold">Daftar Pengguna</h3>
                <button onclick="closeRelationsModal()" class="text-white hover:opacity-80">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="relations-modal-list" class="p-4 max-h-60 overflow-y-auto space-y-2.5 divide-y divide-gray-100">
                <!-- Data dimuat lewat profil.js -->
            </div>
        </div>
    </div>

    <!-- === MODAL FORMULIR KIRIM PESAN === -->
    <div id="message-modal" class="hidden fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-xl shadow-lg max-w-sm w-full">
            <h3 class="text-lg font-bold text-gray-900">Kirim Pesan</h3>
            <p class="text-xs text-gray-500 mt-1">Kirim pesan langsung ke <span id="message-target-name" class="font-bold text-indigo-600"></span></p>
            <textarea id="message-input" rows="3" placeholder="Tulis pesan Anda di sini..." class="w-full mt-3 p-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            <div class="mt-4 flex space-x-2 justify-end">
                <button onclick="sendMessage()" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition">Kirim</button>
                <button onclick="closeMessageModal()" class="bg-gray-200 hover:bg-gray-300 text-gray-800 text-xs font-semibold px-4 py-2 rounded-lg transition">Batal</button>
            </div>
        </div>
    </div>

    <!-- Hubungkan ke JS khusus modul profil -->
    <script type="module" src="profil.js"></script>
</body>
</html>
