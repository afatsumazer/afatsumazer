<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar - AFATSUMAZER</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.register-box{

width:450px;
background:white;
padding:35px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.25);

}

.logo{

text-align:center;
font-size:30px;
font-weight:bold;
margin-bottom:10px;
color:#2563eb;

}

.subtitle{

text-align:center;
margin-bottom:25px;
color:#666;

}

.input-group{

margin-bottom:18px;

}

.input-group label{

display:block;
margin-bottom:8px;
font-weight:bold;

}

.input-group input,
.input-group select{

width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;

}

button{

width:100%;
padding:15px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

.links{

margin-top:20px;
text-align:center;

}

.links a{

color:#2563eb;
text-decoration:none;

}

.error{

margin-top:15px;
color:red;
text-align:center;

}

.success{

margin-top:15px;
color:green;
text-align:center;

}

.loading{

display:none;
text-align:center;
margin-top:15px;
color:#2563eb;

}

</style>

</head>

<body>

<div class="register-box">

<div class="logo">

AFATSUMAZER

</div>

<div class="subtitle">

Buat Akun Freelancer

</div>

<form id="registerForm">

<div class="input-group">

<label>Nama Lengkap</label>

<input
type="text"
id="fullname"
required>

</div>

<div class="input-group">

<label>Username</label>

<input
type="text"
id="username"
required>

</div>

<div class="input-group">

<label>Email</label>

<input
type="email"
id="email"
required>

</div>

<div class="input-group">

<label>Nomor WhatsApp</label>

<input
type="tel"
id="phone">

</div>

<div class="input-group">

<label>Jenis Akun</label>

<select id="role">

<option value="freelancer">Freelancer</option>

<option value="client">Client</option>

</select>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="password"
required>

</div>

<div class="input-group">

<label>Konfirmasi Password</label>

<input
type="password"
id="confirmPassword"
required>

</div>

<button type="submit">

Daftar Sekarang

</button>

</form>

<div class="loading" id="loading">

Membuat akun...

</div>

<div class="success" id="success"></div>

<div class="error" id="error"></div>

<div class="links">

Sudah punya akun?

<a href="login.html">

Login

</a>

<br><br>

<a href="index.html">

← Kembali ke Beranda

</a>

</div>

</div>

<script type="module" src="js/register.js"></script>

</body>
</html>
