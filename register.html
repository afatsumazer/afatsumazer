<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar Akun Baru - AppSaya</title>
    <!-- Menggunakan Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Google Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 min-h-screen flex items-center justify-center p-4 md:p-6">

    <div class="bg-white rounded-2xl border border-slate-100 shadow-xl shadow-slate-100/50 max-w-md w-full p-6 md:p-8 space-y-6">
        
        <!-- Header Pendaftaran -->
        <div class="text-center">
            <div class="inline-flex h-10 w-10 bg-indigo-600 rounded-xl items-center justify-center text-white font-bold text-lg mb-3 shadow-md shadow-indigo-100">
                A
            </div>
            <h2 class="text-xl font-bold text-slate-900">Buat Akun Baru</h2>
            <p class="text-xs text-slate-400 mt-1">Gabung bersama kami dan mulai kelola berkas Anda</p>
        </div>

        <!-- Tombol Daftar dengan Google -->
        <button type="button" id="btn-google-register" class="w-full flex items-center justify-center space-x-2 border border-slate-200 hover:bg-slate-50 text-slate-600 py-3 rounded-xl text-sm font-semibold transition duration-200">
            <!-- Icon Google SVG -->
            <svg class="w-4 h-4" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" fill="#EA4335"/>
            </svg>
            <span>Daftar dengan Google</span>
        </button>

        <!-- Divider -->
        <div class="relative flex py-1 items-center">
            <div class="flex-grow border-t border-slate-100"></div>
            <span class="flex-shrink mx-4 text-slate-300 text-[10px] uppercase font-bold tracking-wider">Atau dengan Email</span>
            <div class="flex-grow border-t border-slate-100"></div>
        </div>

        <!-- Form Pendaftaran -->
        <form id="register-form" class="space-y-4">
            <!-- Nama Lengkap -->
            <div class="space-y-1">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Nama Lengkap</label>
                <input type="text" id="reg-name" placeholder="Nama Lengkap Anda" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 bg-slate-50/30 transition duration-200">
            </div>

            <!-- Email -->
            <div class="space-y-1">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Alamat Email</label>
                <input type="email" id="reg-email" placeholder="nama@email.com" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 bg-slate-50/30 transition duration-200">
            </div>

            <!-- Password -->
            <div class="space-y-1">
                <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Kata Sandi</label>
                <input type="password" id="reg-password" placeholder="Minimal 6 karakter" required minlength="6" class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 bg-slate-50/30 transition duration-200">
            </div>

            <!-- Tombol Submit -->
            <div class="pt-2">
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl text-sm font-semibold shadow-md shadow-indigo-100 transition duration-200">
                    Buat Akun Saya
                </button>
            </div>
        </form>

        <!-- Link ke Login -->
        <div class="text-center text-xs text-slate-400">
            Sudah memiliki akun? 
            <a href="login.html" class="text-indigo-600 hover:text-indigo-800 font-bold ml-1 transition duration-200">Masuk di sini</a>
        </div>
    </div>

    <!-- Hubungkan ke file JS bertipe modul -->
    <script type="module" src="js/register.js"></script>
</body>
</html>
