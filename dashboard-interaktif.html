<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Dashboard Pengguna (Interaktif)</title>
    <!-- Menggunakan Tailwind CSS via CDN -->
    <script src="https://tailwindcss.com"></script>
    <!-- Font Awesome untuk ikon -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body class="bg-gray-100 font-sans flex h-screen overflow-hidden">

    <!-- 1. SIDEBAR -->
    <aside class="w-64 bg-indigo-900 text-white flex flex-col justify-between hidden md:flex">
        <div>
            <div class="p-5 text-2xl font-bold tracking-wider border-b border-indigo-800 flex items-center gap-3">
                <i class="fa-solid fa-cubes text-indigo-400"></i>
                <span>PortalKita</span>
            </div>
            <nav class="mt-6 px-4 space-y-2">
                <button onclick="switchTab('ringkasan-tab')" id="btn-ringkasan-tab" class="w-full flex items-center gap-4 px-4 py-3 bg-indigo-800 rounded-lg text-white font-medium transition tab-btn">
                    <i class="fa-solid fa-chart-pie w-5"></i> Ringkasan
                </button>
                <button onclick="switchTab('profil-tab')" id="btn-profil-tab" class="w-full flex items-center gap-4 px-4 py-3 text-indigo-200 hover:bg-indigo-800 hover:text-white rounded-lg transition tab-btn">
                    <i class="fa-solid fa-user w-5"></i> Edit Profil
                </button>
            </nav>
        </div>
        <div class="p-4 border-t border-indigo-800">
            <a href="#" class="flex items-center gap-4 px-4 py-3 text-red-300 hover:bg-red-700 hover:text-white rounded-lg transition">
                <i class="fa-solid fa-right-from-bracket w-5"></i> Keluar Sistem
            </a>
        </div>
    </aside>

    <!-- 2. AREA KONTEN UTAMA -->
    <div class="flex-1 flex flex-col overflow-y-auto">
        
        <!-- HEADER -->
        <header class="bg-white shadow-sm border-b px-6 py-4 flex justify-between items-center">
            <h1 class="text-xl font-semibold text-gray-800">Manajemen Portal</h1>
            <div class="flex items-center gap-4">
                <div class="text-right">
                    <p id="header-user-name" class="text-sm font-semibold text-gray-700">Budi Santoso</p>
                    <p class="text-xs text-green-500 font-medium"><i class="fa-solid fa-circle text-[8px] mr-1"></i>Online</p>
                </div>
                <img src="https://unsplash.com" alt="Avatar" class="w-10 h-10 rounded-full border-2 border-indigo-500 object-cover">
            </div>
        </header>

        <!-- KONTEN UNTUK TIAP TAB -->
        <main class="p-6 space-y-6">

            <!-- ================= TAB 1: RINGKASAN & TAMBAH DATA ================= -->
            <div id="ringkasan-tab" class="tab-content space-y-6">
                <!-- Tombol Aksi Tambah Data -->
                <div class="flex justify-between items-center">
                    <h2 class="text-lg font-bold text-gray-800">Overview Aktivitas</h2>
                    <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-xl text-sm font-medium shadow-sm transition flex items-center gap-2">
                        <i class="fa-solid fa-plus"></i> Tambah Layanan/Aktivitas Baru
                    </button>
                </div>

                <!-- Riwayat Aktivitas Dinamis -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border">
                    <h3 class="text-md font-bold text-gray-800 mb-4"><i class="fa-solid fa-list-check text-indigo-500 mr-2"></i>Daftar Layanan yang Diikuti</h3>
                    <div id="activity-list" class="divide-y text-sm">
                        <!-- Data awal -->
                        <div class="py-3 flex justify-between items-center">
                            <div>
                                <p class="font-medium text-gray-800">Pelatihan Dasar UI/UX</p>
                                <p class="text-xs text-gray-400">Kategori: Edukasi</p>
                            </div>
                            <span class="px-2.5 py-1 bg-green-50 text-green-700 text-xs font-semibold rounded-full">Aktif</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- ================= TAB 2: FORM EDIT PROFIL ================= -->
            <div id="profil-tab" class="tab-content hidden space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border max-w-2xl">
                    <h2 class="text-xl font-bold text-gray-800 mb-4"><i class="fa-solid fa-user-gear text-indigo-500 mr-2"></i>Pengaturan Profil Anda</h2>
                    
                    <form id="profileForm" onsubmit="saveProfile(event)" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nama Lengkap</label>
                            <input type="text" id="input-name" value="Budi Santoso" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" required>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Alamat Email</label>
                            <input type="email" id="input-email" value="budi.santoso@email.com" class="w-full px-4 py-2 border rounded-xl bg-gray-50 text-gray-500 cursor-not-allowed" disabled>
                            <span class="text-xs text-gray-400">Email tidak dapat diubah demi keamanan akun.</span>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Nomor Telepon</label>
                            <input type="tel" id="input-phone" value="081234567890" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        </div>
                        <div class="pt-2">
                            <button type="submit" class="bg-green-600 hover:bg-green-700 text-white px-5 py-2.5 rounded-xl text-sm font-medium shadow-sm transition">
                                <i class="fa-solid fa-floppy-disk mr-1"></i> Simpan Perubahan
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <!-- ================= MODAL DIALOG: TAMBAH DATA BARU ================= -->
    <div id="addDataModal" class="fixed inset-0 bg-black/50 items-center justify-center hidden z-50 p-4">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl space-y-4 animate-in fade-in zoom-in-95 duration-150">
            <div class="flex justify-between items-center border-b pb-3">
                <h3 class="text-lg font-bold text-gray-800">Tambah Layanan Baru</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fa-solid fa-xmark text-lg"></i></button>
            </div>
            
            <form id="modalForm" onsubmit="addNewActivity(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Layanan / Kegiatan</label>
                    <input type="text" id="modal-item-name" placeholder="Contoh: Webinar Desain Grafis" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kategori</label>
                    <select id="modal-item-category" class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                        <option value="Edukasi">Edukasi</option>
                        <option value="Finansial">Finansial</option>
                        <option value="Kesehatan">Kesehatan</option>
                    </select>
                </div>
                <div class="flex justify-end gap-3 pt-3 border-t">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border text-gray-600 rounded-xl text-sm hover:bg-gray-50">Batal</button>
                    <button type="submit" class="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-xl text-sm font-medium">Simpan Data</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ================= JAVASCRIPT LOGIC ================= -->
    <script>
        // 1. Fungsi Navigasi Antar Tab (Ringkasan vs Edit Profil)
        function switchTab(tabId) {
            // Sembunyikan semua konten tab
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
            // Tampilkan tab yang dipilih
            document.getElementById(tabId).classList.remove('hidden');

            // Reset gaya tombol navigasi sidebar
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-indigo-800', 'text-white', 'font-medium');
                btn.classList.add('text-indigo-200');
            });
            // Aktifkan gaya tombol yang sedang diklik
            document.getElementById('btn-' + tabId).classList.add('bg-indigo-800', 'text-white', 'font-medium');
        }

        // 2. Kontrol Modal Pop-up (Buka/Tutup)
        function openModal() {
            document.getElementById('addDataModal').classList.remove('hidden');
            document.getElementById('addDataModal').classList.add('flex');
        }
        function closeModal() {
