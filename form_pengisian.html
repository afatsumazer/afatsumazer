<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pembuatan Kwitansi</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f3f4f6;
            padding: 20px;
            color: #333;
        }
        .form-container {
            max-width: 500px;
            margin: auto;
            background: #fff;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        
        /* Area Tanda Tangan Canvas */
        .signature-pad-wrapper {
            border: 1px solid #ccc;
            border-radius: 4px;
            background: #fafafa;
            position: relative;
        }
        #signature-canvas {
            width: 100%;
            height: 150px;
            display: block;
            cursor: crosshair;
        }
        .clear-btn {
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 3px;
            margin: 5px;
        }
        
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }
        .submit-btn:hover {
            background-color: #27ae60;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 style="margin-top:0; border-bottom: 2px solid #2ecc71; padding-bottom: 10px;">Buat Kwitansi Baru</h2>
        
        <form id="receiptForm" onsubmit="handleSubmit(event)">
            <!-- 1. Input Teks Biasa -->
            <div class="form-group">
                <label for="pembayar">Diterima Dari (Nama Pelanggan)</label>
                <input type="text" id="pembayar" required placeholder="Contoh: Budi Santoso">
            </div>

            <div class="form-group">
                <label for="nominal">Nominal Uang (Rp)</label>
                <input type="number" id="nominal" required placeholder="Contoh: 1500000">
            </div>

            <div class="form-group">
                <label for="keterangan">Untuk Pembayaran</label>
                <textarea id="keterangan" rows="3" required placeholder="Contoh: Pembayaran DP Sewa Gedung"></textarea>
            </div>

            <div class="form-group">
                <label for="penerima">Nama Penerima (Kasir)</label>
                <input type="text" id="penerima" required placeholder="Contoh: Ahmad Subarjo">
            </div>

            <!-- 2. Area Tanda Tangan Gambar (Canvas) -->
            <div class="form-group">
                <label>Goreskan Tanda Tangan Di Sini:</label>
                <div class="signature-pad-wrapper">
                    <canvas id="signature-canvas"></canvas>
                    <button type="button" class="clear-btn" onclick="clearSignature()">Hapus Coretan</button>
                </div>
            </div>

            <button type="submit" class="submit-btn">Simpan ke Database</button>
        </form>
    </div>

    <script>
        // Inisialisasi Canvas untuk menggambar tanda tangan
        const canvas = document.getElementById('signature-canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Atur ukuran internal canvas sesuai elemennya agar presisi
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#1a252f'; // Warna tinta tanda tangan
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Event listener menggambar dengan Mouse / Touchscreen
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.beginPath();
            ctx.moveTo(touch.clientX - rect.left, touch.clientY - rect.top);
            isDrawing = true;
            e.preventDefault();
        });
        canvas.addEventListener('touchmove', (e) => {
            if (!isDrawing) return;
            const touch = e.touches[0];
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(touch.clientX - rect.left, touch.clientY - rect.top);
            ctx.stroke();
            e.preventDefault();
        });
        canvas.addEventListener('touchend', () => isDrawing = false);

        function startDrawing(e) {
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        }

        function draw(e) {
            if (!isDrawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function clearSignature() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Ketika form dikirim (Submit)
        function handleSubmit(event) {
            event.preventDefault();

            // Mengonversi goresan tanda tangan di canvas menjadi string gambar (Base64)
            const signatureImageBase64 = canvas.toDataURL('image/png');

            // Kumpulkan semua data untuk dikirim ke database
            const dataToDatabase = {
                nama_pembayar: document.getElementById('pembayar').value,
                nominal: document.getElementById('nominal').value,
                keterangan: document.getElementById('keterangan').value,
                nama_penerima: document.getElementById('penerima').value,
                tanda_tangan_img: signatureImageBase64 // Ini berisi string gambar tanda tangan
            };

            console.log("Kirim objek ini ke database:", dataToDatabase);
            
            // Di sini Anda biasanya melakukan fetch/POST ke server database Anda, contoh:
            /*
            fetch('/api/simpan-kwitansi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(dataToDatabase)
            }).then(res => { ... });
            */

            alert("Data dan tanda tangan berhasil disimpan! Sekarang Anda bisa mengarahkannya ke halaman cetak (Tahap 2).");
        }
    </script>
</body>
</html>
