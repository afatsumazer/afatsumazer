<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Mining - AFATSUMAZER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#07111f;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{

width:95%;
max-width:420px;

background:#111d33;

padding:25px;

border-radius:25px;

text-align:center;

box-shadow:0 0 25px rgba(0,150,255,.4);

}

h2{

margin-bottom:20px;

}

.timer{

font-size:45px;

margin:25px 0;

color:#00d4ff;

font-weight:bold;

}

button{

width:100%;

padding:18px;

font-size:20px;

border:none;

border-radius:18px;

background:#0066ff;

color:white;

cursor:pointer;

margin-top:15px;

}

button:disabled{

background:#444;

}

.point{

margin-top:20px;

font-size:22px;

}

</style>

</head>

<body>

<div class="card">

<h2>⛏️ Mining Machine</h2>

<div class="timer" id="timer">

01:00

</div>

<button id="startBtn" onclick="startMining()">

START MINING

</button>

<button id="claimBtn" onclick="claim()" style="display:none;background:#00aa55;">

CLAIM REWARD

</button>

<div class="point">

Point :
<span id="point">0</span>

</div>

</div>

<script>

let point=parseInt(localStorage.getItem("point"))||0;

document.getElementById("point").innerHTML=point;

let finish=localStorage.getItem("finish");

function startMining(){

finish=Date.now()+60000;

localStorage.setItem("finish",finish);

update();

}

function update(){

finish=localStorage.getItem("finish");

if(!finish)return;

let s=Math.floor((finish-Date.now())/1000);

if(s<=0){

document.getElementById("timer").innerHTML="SELESAI";

document.getElementById("startBtn").style.display="none";

document.getElementById("claimBtn").style.display="block";

localStorage.removeItem("finish");

return;

}

let m=Math.floor(s/60);

let d=s%60;

document.getElementById("timer").innerHTML=

String(m).padStart(2,"0")+":"+

String(d).padStart(2,"0");

document.getElementById("startBtn").disabled=true;

}

function claim(){

point+=20;

localStorage.setItem("point",point);

document.getElementById("point").innerHTML=point;

document.getElementById("claimBtn").style.display="none";

document.getElementById("startBtn").style.display="block";

document.getElementById("startBtn").disabled=false;

document.getElementById("timer").innerHTML="01:00";

alert("🎉 +20 Point");

}

update();

setInterval(update,1000);

</script>

</body>
</html>
