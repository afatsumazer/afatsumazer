<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Kwitansi Resmi</title>
    <style id="dynamic-style">
        /* Gaya dasar awal */
        body {
            background-color: #f1f5f9;
            margin: 0;
            padding: 30px;
        }
        .print-btn-container {
            max-width: 800px;
            margin: 0 auto 20px auto;
            text-align: right;
        }
        .btn-print {
            font-family: Arial, sans-serif;
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        /* Container Kwitansi Utama */
        .receipt-box {
            margin: auto;
            padding: 30px;
            background-color: #fff;
            border: 2px solid #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            box-sizing: border-box;
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* Mode Ukuran Kertas Dinamis */
        .size-a4 {
            width: 210mm; /* Sesuai lebar A4 */
            min-height: auto;
        }
        .size-struk {
            width: 80mm; /* Lebar printer struk */
            padding: 15px;
            border: 1px dashed #333;
        }

        /* Header */
        .receipt-header {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px double #333;
            padding-bottom: 10px;
            margin-bottom: 25px;
        }
        .size-struk .receipt-header {
            flex-direction: column;
            text-align: center;
            border-bottom: 1px dashed #333;
        }
        .receipt-header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 2px;
        }
        .size-struk .receipt-header h1 {
            font-size: 20px;
        }

        /* Konten baris */
        .receipt-row {
            display: flex;
            margin-bottom: 18px;
            align-items: baseline;
        }
        .size-struk .receipt-row {
            flex-direction: column;
            margin-bottom: 12px;
        }
        .receipt-label {
            width: 180px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
        }
        .size-struk .receipt-label {
            width: 100%;
            font-size: 11px;
            color: #555;
        }
        .receipt-dots {
            flex-grow: 1;
            border-bottom: 1px dotted #333;
            padding-left: 10px;
            font-size: 14px;
        }
        .size-struk .receipt-dots {
            width: 100%;
            border-bottom: none;
            padding-left: 0;
            font-size: 13px;
            font-weight: bold;
        }

        .terbilang-box {
            font-style: italic;
            background-color: #f8fafc;
            padding: 5px 10px;
            border: 1px dashed #cbd5e1;
        }

        /* Footer tanda tangan */
        .receipt-footer {
            display: flex;
            justify-content: space-between;
            margin-top: 40px;
            align-items: flex-end;
        }
        .size-struk .receipt-footer {
            flex-direction: column;
            align-items: center;
            gap: 20px;
            margin-top: 30px;
        }
        .amount-box {
            border: 2px solid #333;
            padding: 10px 20px;
            font-size: 18px;
            font-weight: bold;
            background-color: #f1f5f9;
        }
        .size-struk .amount-box {
            width: 100%;
            text-align: center;
            box-sizing: border-box;
            font-size: 16px;
        }

        .sig-box {
            text-align: center;
            width: 180px;
        }
        .sig-image-container {
            height: 65px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #333;
            margin-bottom: 5px;
        }
        .size-struk .sig-image-container {
            height: 50px;
        }
        .sig-image-container img {
            max-height: 100%;
            max-width: 100%;
        }

        @media print {
            .print-btn-container {
                display: none !important;
            }
            body {
                background-color: #fff;
                padding: 0;
            }
            .receipt-box {
                box-shadow: none;
                border: 2px solid #000;
            }
            .size-struk .receipt-box {
                border: none;
            }
        }
    </style>
</head>
<body>

    <div class="print-btn-container">
        <button class="btn-print" onclick="window.print()">Cetak Kwitansi</button>
    </div>

    <!-- Container Kwitansi Utama -->
    <div class="receipt-box" id="box-receipt" oncontextmenu="return false;">
        <div class="receipt-header">
            <!-- Info Perusahaan -->
            <div id="comp-info-block">
                <strong id="lblPerusahaan" style="font-size: 16px;">...</strong><br>
                <small id="lblAlamat" style="color: #444;">...</small>
            </div>
            
            <div style="text-align: right;" id="title-block">
                <h1>KWITANSI</h1>
                <strong>No. <span id="lblNomor">...</span></strong>
            </div>
        </div>

        <div class="receipt-row">
            <span class="receipt-label">Telah Diterima Dari</span>
            <span class="receipt-dots">: <strong id="lblPembayar">...</strong></span>
        </div>

        <div class="receipt-row">
            <span class="receipt-label">Uang Sejumlah</span>
            <span class="receipt-dots terbilang-box">: <span id="lblTerbilang">...</span></span>
        </div>

        <div class="receipt-row" id="row-keterangan">
            <span class="receipt-label">Untuk Pembayaran</span>
            <span class="receipt-dots">: <span id="lblKeterangan">...</span></span>
        </div>

        <div class="receipt-footer">
            <div>
                <div class="amount-box" id="lblNominal">
                    Rp 0
                </div>
            </div>
            
            <!-- Area Tanda Tangan -->
            <div class="sig-box" id="sig-area">
                <p style="margin: 0 0 5px 0;"><small id="lblTanggal">Jakarta, ...</small></p>
                
                <div class="sig-image-container" id="sig-image-wrapper">
                    <img id="imgTtd" src="" alt="Tanda Tangan">
                </div>
                
                <p style="font-weight: bold; margin: 0; font-size: 12px;" id="lblPenerima">...</p>
                <small id="lblJabatan">...</small>
            </div>
        </div>
    </div>

    <script>
        function terbilang(nilai) {
            let bilangan = ["", "Satu", "Dua", "Tiga", "Empat", "Lima", "Enam", "Tujuh", "Delapan", "Sembilan", "Sepuluh", "Sebelas"];
            let temp = "";
            nilai = Math.floor(nilai);

            if (nilai < 12) {
                temp = " " + bilangan[nilai];
            } else if (nilai < 20) {
                temp = terbilang(nilai - 10) + " Belas";
            } else if (nilai < 100) {
                temp = terbilang(Math.floor(nilai / 10)) + " Puluh" + terbilang(nilai % 10);
            } else if (nilai < 200) {
                temp = " Seratus" + terbilang(nilai - 100);
            } else if (nilai < 1000) {
                temp = terbilang(Math.floor(nilai / 100)) + " Ratus" + terbilang(nilai % 100);
            } else if (nilai < 2000) {
                temp = " Seribu" + terbilang(nilai - 1000);
            } else if (nilai < 1000000) {
                temp = terbilang(Math.floor(nilai / 1000)) + " Ribu" + terbilang(nilai % 1000);
            } else if (nilai < 1000000000) {
                temp = terbilang(Math.floor(nilai / 1000000)) + " Juta" + terbilang(nilai % 1000000);
            }
            return temp.trim();
        }

        window.onload = function() {
            const storedData = localStorage.getItem('kwitansi_terbaru');
            if (storedData) {
                const data = JSON.parse(storedData);

                // 1. Terapkan Layout Ukuran & Font Dinamis
                const box = document.getElementById('box-receipt');
                box.className = 'receipt-box'; // reset
                
                if (data.kertas === 'struk') {
                    box.classList.add('size-struk');
                } else {
                    box.classList.add('size-a4');
                }

                // Terapkan Font dan Warna Tema Pilihan
                box.style.fontFamily = data.font;
                box.style.borderColor = data.tema;

                // 2. Terapkan teks / kosongkan jika input kosong
                if (data.perusahaan) {
                    document.getElementById('lblPerusahaan').innerText = data.perusahaan;
                    document.getElementById('lblPerusahaan').style.color = data.tema;
                } else {
                    document.getElementById('lblPerusahaan').style.display = 'none';
                }

                if (data.alamat) {
                    document.getElementById('lblAlamat').innerText = data.alamat;
                } else {
                    document.getElementById('lblAlamat').style.display = 'none';
                }

                // Hapus blok info perusahaan jika keduanya kosong
                if (!data.perusahaan && !data.alamat) {
                    document.getElementById('comp-info-block').style.display = 'none';
                }

                // Pengisian Detail Transaksi
                document.getElementById('lblNomor').innerText = data.nomor;
                document.getElementById('lblPembayar').innerText = data.pembayar;
                document.getElementById('lblKeterangan').innerText = data.keterangan;
                document.getElementById('lblTanggal').innerText = `Jakarta, ${data.tanggal}`;

                // Pengisian Jabatan / Penerima
                if (data.penerima) {
                    document.getElementById('lblPenerima').innerText = data.penerima;
                } else {
                    document.getElementById('lblPenerima').style.display = 'none';
                }

                if (data.jabatan) {
                    document.getElementById('lblJabatan').innerText = data.jabatan;
                } else {
                    document.getElementById('lblJabatan').style.display = 'none';
                }

                // Hilangkan area teks tanda tangan jika nama dan jabatan kosong
                if (!data.penerima && !data.jabatan && !data.tanda_tangan) {
                    document.getElementById('sig-area').style.display = 'none';
                }

                // Handle Tanda Tangan Gambar (Dikosongkan jika tidak menggambar)
                if (data.tanda_tangan) {
                    document.getElementById('imgTtd').src = data.tanda_tangan;
                } else {
                    // Sembunyikan garis/kotak gambar agar tampak rapi jika kosong
                    document.getElementById('sig-image-wrapper').style.borderBottom = 'none';
                    document.getElementById('imgTtd').style.display = 'none';
                }

                // Format Nominal Angka & Kalimat Terbilang
                const formattedAmt = new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(data.nominal);
                document.getElementById('lblNominal').innerText = formattedAmt;
                document.getElementById('lblNominal').style.color = data.tema;
                document.getElementById('lblTerbilang').innerText = terbilang(data.nominal) + " Rupiah";
            }
        };
    </script>
</body>
</html>
