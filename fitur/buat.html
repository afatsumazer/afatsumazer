<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Buat Kwitansi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .form-container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }
        h2 {
            margin-top: 0;
            color: #1e3a8a;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 10px;
        }
        h3 {
            font-size: 14px;
            color: #1e3a8a;
            margin-top: 20px;
            border-bottom: 1px dashed #cbd5e1;
            padding-bottom: 5px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #475569;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .sig-wrapper {
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            background: #fafafa;
            position: relative;
            touch-action: none; /* Mencegah layar bergeser saat tanda tangan di HP */
        }
        #sig-canvas {
            width: 100%;
            height: 150px;
            display: block;
            cursor: crosshair;
        }
        .clear-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            font-size: 11px;
            cursor: pointer;
            border-radius: 3px;
            margin: 8px;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 15px;
        }
        .submit-btn:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Atur Kwitansi</h2>
        
        <form onsubmit="simpanDanCetak(event)">
            <!-- Pengaturan Perusahaan / Toko -->
            <h3>Informasi Penerbit (Bisa Dikosongkan)</h3>
            <div class="form-group">
                <label>Nama PT / Toko</label>
                <input type="text" id="perusahaan" value="PT. Solusi Digital Indo">
            </div>
            <div class="form-group">
                <label>Alamat / Kontak</label>
                <input type="text" id="alamat" value="Jl. Jenderal Sudirman No. 12, Jakarta">
            </div>

            <!-- Detail Transaksi -->
            <h3>Detail Transaksi</h3>
            <div class="form-group">
                <label>Nomor Kwitansi</label>
                <input type="text" id="nomor" required value="KW-2026-001">
            </div>
            <div class="form-group">
                <label>Diterima Dari (Nama Pembayar)</label>
                <input type="text" id="pembayar" required placeholder="Nama Pembayar">
            </div>
            <div class="form-group">
                <label>Nominal (Rp)</label>
                <input type="number" id="nominal" required placeholder="Contoh: 1500000">
            </div>
            <div class="form-group">
                <label>Untuk Pembayaran</label>
                <textarea id="keterangan" rows="2" required placeholder="Contoh: Jasa Pembuatan Desain Grafis"></textarea>
            </div>

            <!-- Detail Tanda Tangan & Penerima -->
            <h3>Penerima & Jabatan</h3>
            <div class="form-group">
                <label>Nama Penerima (Bisa Dikosongkan)</label>
                <input type="text" id="penerima" value="Ahmad Subarjo">
            </div>
            <div class="form-group">
                <label>Jabatan / Keterangan TTD (Bisa Dikosongkan)</label>
                <input type="text" id="jabatan" value="Kasir Utama" placeholder="Contoh: Kasir, Direktur, Penerima">
            </div>

            <!-- Desain, Ukuran, & Gaya -->
            <h3>Gaya & Ukuran Dokumen</h3>
            <div class="form-group">
                <label>Ukuran Kertas</label>
                <select id="kertas">
                    <option value="a4">Kertas A4 Standar (Lebar)</option>
                    <option value="struk">Struk Kasir (80mm)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Gaya Huruf (Font)</label>
                <select id="font">
                    <option value="monospace">Courier (Klasik / Retro)</option>
                    <option value="sans-serif">Arial / Helvetica (Modern)</option>
                    <option value="serif">Georgia (Elegant / Formal)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Warna Tema Dokumen</label>
                <select id="tema">
                    <option value="#1e293b">Hitam / Slate</option>
                    <option value="#1e3a8a">Biru Navy</option>
                    <option value="#065f46">Hijau Forest</option>
                </select>
            </div>

            <!-- Tanda Tangan -->
            <h3>Tanda Tangan (Bisa Dikosongkan)</h3>
            <div class="form-group">
                <div class="sig-wrapper">
                    <canvas id="sig-canvas"></canvas>
                    <button type="button" class="clear-btn" onclick="hapusCoretan()">Hapus Tanda Tangan</button>
                </div>
            </div>

            <button type="submit" class="submit-btn">Simpan & Cetak Kwitansi</button>
        </form>
    </div>

    <script>
        const canvas = document.getElementById('sig-canvas');
        const ctx = canvas.getContext('2d');
        let drawing = false;
        let hasSignature = false; // Flag untuk mengetahui apakah user sudah menandatangani

        function inisialisasiCanvas() {
            const rect = canvas.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.strokeStyle = '#1e293b';
        }
        
        // Atur ulang ukuran canvas saat pertama dimuat
        window.addEventListener('load', inisialisasiCanvas);
        window.addEventListener('resize', inisialisasiCanvas);

        // Membaca koordinat gambar secara akurat pada layar sentuh maupun mouse
        function getCoords(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top
                };
            }
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        // Event handler Mouse
        canvas.addEventListener('mousedown', (e) => {
            drawing = true;
            const pos = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            hasSignature = true;
        });
        canvas.addEventListener('mousemove', (e) => {
            if (!drawing) return;
            const pos = getCoords(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        });
        canvas.addEventListener('mouseup', () => drawing = false);
        canvas.addEventListener('mouseleave', () => drawing = false);

        // Event handler Sentuhan (HP/Tablet)
        canvas.addEventListener('touchstart', (e) => {
            drawing = true;
            const pos = getCoords(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            hasSignature = true;
            e.preventDefault();
        }, { passive: false });
        
        canvas.addEventListener('touchmove', (e) => {
            if (!drawing) return;
            const pos = getCoords(e);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            e.preventDefault();
        }, { passive: false });
        
        canvas.addEventListener('touchend', () => drawing = false);

        function hapusCoretan() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hasSignature = false;
        }

        function simpanDanCetak(event) {
            event.preventDefault();

            // Jika kosong, abaikan pengiriman data gambar
            const ttdBase64 = hasSignature ? canvas.toDataURL('image/png') : '';

            const kwitansiData = {
                perusahaan: document.getElementById('perusahaan').value,
                alamat: document.getElementById('alamat').value,
                nomor: document.getElementById('nomor').value,
                pembayar: document.getElementById('pembayar').value,
                nominal: document.getElementById('nominal').value,
                keterangan: document.getElementById('keterangan').value,
                penerima: document.getElementById('penerima').value,
                jabatan: document.getElementById('jabatan').value,
                // Parameter Tampilan Dinamis
                kertas: document.getElementById('kertas').value,
                font: document.getElementById('font').value,
                tema: document.getElementById('tema').value,
                tanda_tangan: ttdBase64,
                tanggal: new Date().toLocaleDateString('id-ID', { year: 'numeric', month: 'long', day: 'numeric' })
            };

            localStorage.setItem('kwitansi_terbaru', JSON.stringify(kwitansiData));
            window.open('cetak.html', '_blank');
        }
    </script>
</body>
</html>
