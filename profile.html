<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
margin:0;
background:#f4f6f9;
font-family:Arial,sans-serif;
}

.container{
max-width:500px;
margin:30px auto;
background:#fff;
border-radius:15px;
padding:25px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.profile-img{
width:120px;
height:120px;
border-radius:50%;
display:block;
margin:auto;
object-fit:cover;
border:5px solid #0d6efd;
}

h2{
text-align:center;
margin-top:15px;
}

.item{
margin-top:20px;
}

label{
font-weight:bold;
display:block;
margin-bottom:5px;
}

.value{
padding:12px;
background:#f8f8f8;
border-radius:8px;
}

button{

width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
background:#0d6efd;
color:white;
font-size:16px;
cursor:pointer;

}

.logout{

background:#dc3545;

}

</style>

</head>

<body>

<div class="container">

<img id="photo" class="profile-img" src="https://via.placeholder.com/120">

<h2 id="name">Loading...</h2>

<div class="item">
<label>Email</label>
<div class="value" id="email"></div>
</div>

<div class="item">
<label>UID</label>
<div class="value" id="uid"></div>
</div>

<div class="item">
<label>Email Verified</label>
<div class="value" id="verified"></div>
</div>

<div class="item">
<label>Akun Dibuat</label>
<div class="value" id="created"></div>
</div>

<div class="item">
<label>Login Terakhir</label>
<div class="value" id="lastlogin"></div>
</div>

<button onclick="location.href='dashboard.html'">

Dashboard

</button>

<button id="logout" class="logout">

Logout

</button>

</div>

<script type="module" src="js/profile.js"></script>

</body>
</html>
