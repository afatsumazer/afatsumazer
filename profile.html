<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Profil Publik</title>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://gstatic.com",
          "firebase/auth": "https://gstatic.com",
          "firebase/database": "https://gstatic.com"
        }
      }
    </script>
</head>
<body>

    <div id="status-auth" style="background: #eee; padding: 10px; font-size: 12px; margin-bottom: 20px;">
        Memeriksa status login...
    </div>

    <div id="loading">Memuat profil...</div>
    
    <div id="profile-card" style="display: none;">
        <h1 id="user-name">Nama Pengguna</h1>
        <p>Email: <span id="user-email">-</span></p>
        <p>Bio: <span id="user-bio">-</span></p>
    </div>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged, signInAnonymously } from "firebase/auth";
        import { getDatabase, ref, get } from "firebase/database";

        // Konfigurasi Firebase Anda
        const firebaseConfig = {
            apiKey: "AIzaSy...",
            authDomain: "://firebaseapp.com",
            databaseURL: "https://firebaseio.com",
            projectId: "proyek-anda",
            storageBucket: "://appspot.com",
            messagingSenderId: "123456789",
            appId: "1:12345:web:abcde"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // 1. Ambil parameter ?uid= dari URL
        function getUidFromUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('uid');
        }

        const targetUid = getUidFromUrl();

        // 2. Pantau Status Autentikasi Pengunjung
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // JIKA PENGUNJUNG SUDAH LOGIN (Aturan 'auth != null' terpenuhi)
                document.getElementById('status-auth').innerText = `Anda masuk sebagai: ${user.isAnonymous ? 'Tamu Anonim' : user.email}`;
                
                // Ambil data profil dari database
                muatDataProfil(targetUid);
            } else {
                // JIKA PENGUNJUNG BELUM LOGIN
                document.getElementById('status-auth').innerText = "Anda belum login. Mencoba login otomatis sebagai tamu...";
                
                // Opsi 1: Login otomatis sebagai tamu (Anonymous) agar bisa menembus aturan 'auth != null'
                signInAnonymously(auth).catch((error) => {
                    console.error("Gagal login anonim:", error);
                    document.getElementById('loading').innerText = "Anda harus login terlebih dahulu untuk melihat profil ini.";
                });

                // Opsi 2: Jika ingin memaksa mereka ke halaman login utama Anda, aktifkan kode di bawah ini:
                // window.location.href = "login.html";
            }
        });

        // 3. Fungsi mengambil data dari Realtime Database
        function muatDataProfil(uid) {
            if (!uid) {
                document.getElementById('loading').innerText = "Error: Tidak ada parameter UID di URL.";
                return;
            }

            const userRef = ref(db, 'users/' + uid);

            get(userRef).then((snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    
                    document.getElementById('user-name').innerText = userData.name || "Tanpa Nama";
                    document.getElementById('user-email').innerText = userData.email || "-";
                    document.getElementById('user-bio').innerText = userData.bio || "-";
                    
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('profile-card').style.display = 'block';
                } else {
                    document.getElementById('loading').innerText = "Profil tidak ditemukan di database.";
                }
            }).catch((error) => {
                console.error("Gagal memuat:", error);
                document.getElementById('loading').innerText = "Gagal memuat data karena masalah hak akses database.";
            });
        }
    </script>
</body>
</html>
