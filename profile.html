<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Pengguna - AppSaya</title>
    <!-- Menggunakan Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Google Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 min-h-screen flex items-center justify-center p-4 md:p-6">

    <div class="bg-white rounded-2xl border border-slate-100 shadow-xl shadow-slate-100/50 max-w-md w-full overflow-hidden">
        
        <!-- Header Halaman -->
        <div class="p-6 pb-4 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
            <div>
                <h2 class="text-lg font-bold text-slate-900">Portofolio Pengguna</h2>
                <p class="text-xs text-slate-400 mt-0.5">Informasi identitas publik resmi</p>
            </div>
            <!-- Diberi ID id="back-btn" dan id="back-text" -->
            <a id="back-btn" href="dashboard.html" class="flex items-center space-x-1 text-xs font-semibold text-indigo-600 hover:text-indigo-800 transition duration-200">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                <span id="back-text">Kembali</span>
            </a>
        </div>

        <div class="p-6 space-y-6">
            <!-- Kartu Utama Profil -->
            <div class="bg-slate-50/70 p-6 rounded-2xl border border-slate-100 text-center relative">
                <div class="relative inline-block">
                    <!-- Foto Profil -->
                    <img id="profile-preview" src="https://via.placeholder.com/150" alt="Avatar" class="w-24 h-24 rounded-full border-4 border-white shadow-md object-cover mx-auto">
                </div>
                
                <!-- Area Tampilan Nama + Lencana -->
                <div class="flex items-center justify-center mt-4 space-x-1">
                    <span id="preview-name" class="font-bold text-slate-800 text-base">Memuat nama...</span>
                    <!-- Centang Biru -->
                    <span id="badge-verified" class="hidden text-blue-500">
                        <svg class="w-5 h-5 inline-block" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l5-5z" clip-rule="evenodd"></path>
                        </svg>
                    </span>
                </div>
                
                <p id="preview-username" class="text-sm text-slate-400 font-medium mt-0.5">@username</p>
                
                <!-- Label Premium -->
                <div id="badge-premium" class="hidden mt-3">
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-[10px] font-bold bg-amber-50 text-amber-700 border border-amber-100/80 uppercase tracking-wider">
                        ⭐ MEMBER PREMIUM
                    </span>
                </div>
            </div>

            <!-- Catatan Kaki: Tempat Data yang Pengguna Bagikan -->
            <div class="pt-4 border-t border-slate-100 space-y-4">
                <!-- Deskripsi Bio Singkat -->
                <div class="space-y-1">
                    <span class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Bio Singkat</span>
                    <p id="display-bio" class="text-sm text-slate-600 leading-relaxed bg-slate-50/50 rounded-xl p-3.5 border border-slate-100/60 min-h-[60px]">
                        Memuat informasi bio...
                    </p>
                </div>

                <!-- [DITAMBAHKAN] Container Berkas / Kartu Pos Dibagikan -->
                <div class="space-y-2 pt-2">
                    <span class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Berkas Publik Dibagikan</span>
                    <div id="postcard-container" class="space-y-2">
                        <p class="text-xs text-slate-400 italic text-center py-2">Memuat berkas...</p>
                    </div>
                </div>
                
                <!-- Hak Cipta & Tanda Air Aplikasi -->
                <div class="text-center pt-2">
                    <p class="text-[11px] text-slate-400">Profil ini dibagikan secara publik melalui <span class="font-semibold text-indigo-600">AppSaya</span>.</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Panggil File JavaScript Module -->
    <script type="module" src="/view-profile.js"></script>
</body>
</html>
