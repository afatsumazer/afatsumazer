<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profil - AppSaya</title>
    <!-- Menggunakan Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Google Inter untuk tampilan modern & clean -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 min-h-screen flex items-center justify-center p-4 md:p-6">

    <div class="bg-white rounded-2xl border border-slate-100 shadow-xl shadow-slate-100/50 max-w-md w-full overflow-hidden">
        
        <!-- Header Halaman dengan Gradasi Halus -->
        <div class="p-6 pb-4 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
            <div>
                <h2 class="text-lg font-bold text-slate-900">Ubah Profil</h2>
                <p class="text-xs text-slate-400 mt-0.5">Perbarui informasi identitas publik Anda</p>
            </div>
            <a href="dashboard.html" class="flex items-center space-x-1 text-xs font-semibold text-indigo-600 hover:text-indigo-800 transition duration-200">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                <span>Kembali</span>
            </a>
        </div>

        <div class="p-6 space-y-6">
            <!-- Kartu Pratinjau Profil (Live Preview) -->
            <div class="bg-slate-50/70 p-5 rounded-2xl border border-slate-100 text-center relative">
                <div class="relative inline-block group">
                    <img id="profile-preview" src="https://via.placeholder.com/150" alt="Avatar" class="w-20 h-20 rounded-full border-4 border-white shadow-md object-cover mx-auto transition duration-200 group-hover:brightness-90">
                    <input type="file" id="upload-pic" accept="image/*" class="hidden">
                    <label for="upload-pic" class="absolute bottom-0 right-0 bg-indigo-600 text-white p-1.5 rounded-full cursor-pointer hover:bg-indigo-700 shadow-md border-2 border-white transition duration-200">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                        </svg>
                    </label>
                </div>
                
                <!-- Area Tampilan Nama + Lencana -->
                <div class="flex items-center justify-center mt-3 space-x-1">
                    <span id="preview-name" class="font-bold text-slate-800 text-sm">Memuat nama...</span>
                    <!-- Centang Biru (Disembunyikan default, muncul via JS) -->
                    <span id="badge-verified" class="hidden text-blue-500">
                        <svg class="w-4 h-4 inline-block" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l5-5z" clip-rule="evenodd"></path>
                        </svg>
                    </span>
                </div>
                
                <p id="preview-username" class="text-xs text-slate-400 font-medium mt-0.5">@username</p>
                
                <!-- Label Premium (Disembunyikan default, muncul via JS) -->
                <div id="badge-premium" class="hidden mt-2.5">
                    <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[9px] font-bold bg-amber-50 text-amber-700 border border-amber-100">
                        ⭐ MEMBER PREMIUM
                    </span>
                </div>
            </div>

            <!-- Form Input Data -->
            <form id="profile-form" class="space-y-4" onsubmit="event.preventDefault();">
                <!-- Nama Lengkap -->
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Nama Lengkap</label>
                    <input type="text" id="input-name" placeholder="Nama Lengkap Anda" required class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 bg-slate-50/30 transition duration-200">
                </div>

                <!-- ID Unik / Username -->
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">ID Unik (@username)</label>
                    <div class="flex items-center border border-slate-200 rounded-xl overflow-hidden bg-slate-50/30 focus-within:ring-4 focus-within:ring-indigo-500/10 focus-within:border-indigo-500 transition duration-200">
                        <span class="pl-4 text-slate-400 font-semibold text-sm select-none">@</span>
                        <input type="text" id="input-username" placeholder="username" required class="w-full px-2 py-2.5 bg-transparent text-sm focus:outline-none">
                    </div>
                    <small class="text-[10px] text-slate-400 block pl-1">Hanya huruf kecil, angka, dan underscore tanpa spasi.</small>
                </div>

                <!-- Bio -->
                <div class="space-y-1">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase tracking-wider">Bio Singkat</label>
                    <textarea id="input-bio" rows="3" placeholder="Tulis sedikit informasi tentang diri Anda..." class="w-full px-4 py-2.5 border border-slate-200 rounded-xl text-sm focus:outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 bg-slate-50/30 transition duration-200"></textarea>
                </div>

                <!-- Tombol Simpan -->
                <div class="pt-2">
                    <button type="button" id="btn-save-profile" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3 rounded-xl text-sm font-semibold shadow-md shadow-indigo-100 transition duration-200">
                        Simpan Perubahan
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Menghubungkan ke JS eksternal bertipe modul -->
    <script type="module" src="js/edit-profile.js"></script>
</body>
</html>
