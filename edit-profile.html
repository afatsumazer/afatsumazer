<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Profil - AppSaya</title>
    <!-- Menggunakan Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-xl border border-gray-200 shadow-md max-w-md w-full">
        <!-- Header Halaman -->
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold text-gray-900">Ubah Profil Anda</h2>
            <a href="index.html" class="text-xs font-semibold text-indigo-600 hover:text-indigo-800 transition">← Kembali</a>
        </div>

        <!-- Kartu Pratinjau Profil -->
        <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 mb-6 text-center">
            <div class="relative inline-block">
                <img id="profile-preview" src="https://via.placeholder.com/150" alt="Avatar" class="w-20 h-20 rounded-full border border-gray-200 object-cover mx-auto">
                <input type="file" id="upload-pic" accept="image/*" class="hidden">
                <label for="upload-pic" class="absolute bottom-0 right-0 bg-indigo-600 text-white p-1.5 rounded-full cursor-pointer hover:bg-indigo-700 shadow-sm transition">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                    </svg>
                </label>
            </div>
            
            <!-- Area Tampilan Nama + Lencana -->
            <div class="flex items-center justify-center mt-3 space-x-1">
                <span id="preview-name" class="font-bold text-gray-800">Memuat nama...</span>
                <!-- Centang Biru (Disembunyikan default, muncul via JS) -->
                <span id="badge-verified" class="hidden text-blue-500">
                    <svg class="w-5 h-5 inline-block" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l5-5z" clip-rule="evenodd"></path>
                    </svg>
                </span>
            </div>
            
            <p id="preview-username" class="text-xs text-gray-500">@username</p>
            
            <!-- Label Premium (Disembunyikan default, muncul via JS) -->
            <div id="badge-premium" class="hidden mt-2">
                <span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-amber-100 text-amber-800">
                    ⭐ MEMBER PREMIUM
                </span>
            </div>
        </div>

        <!-- Form Input Data -->
        <form id="profile-form" class="space-y-4">
            <!-- Nama Lengkap -->
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Nama Lengkap</label>
                <input type="text" id="input-name" placeholder="Nama Lengkap Anda" required class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>

            <!-- ID Unik / Username -->
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">ID Unik (@username)</label>
                <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden bg-gray-50 focus-within:ring-2 focus-within:ring-indigo-500">
                    <span class="pl-4 text-gray-500 font-medium text-sm">@</span>
                    <input type="text" id="input-username" placeholder="username" required class="w-full px-2 py-2 bg-transparent text-sm focus:outline-none">
                </div>
                <small class="text-[10px] text-gray-400 mt-1 block">Hanya huruf kecil, angka, dan underscore tanpa spasi.</small>
            </div>

            <!-- Bio -->
            <div>
                <label class="block text-xs font-bold text-gray-700 uppercase mb-1">Bio</label>
                <textarea id="input-bio" rows="3" placeholder="Tulis sedikit informasi tentang diri Anda..." class="w-full px-4 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"></textarea>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-lg text-sm font-semibold shadow-md transition">
                Simpan Perubahan
            </button>
        </form>
    </div>

    <!-- Menghubungkan ke JS eksternal -->
    <script type="module" src="js/edit-profile.js"></script>
</body>
</html>
