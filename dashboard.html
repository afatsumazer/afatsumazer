<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pengguna</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { display: flex; min-height: 100vh; background-color: #f4f6f9; }
        .sidebar { width: 250px; background-color: #1e293b; color: #fff; padding: 20px; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 20px; margin-bottom: 30px; text-align: center; color: #38bdf8; }
        .sidebar a { color: #cbd5e1; text-decoration: none; padding: 12px; display: block; border-radius: 8px; margin-bottom: 10px; transition: 0.3s; }
        .sidebar a:hover, .sidebar a.active { background-color: #334155; color: #fff; }
        .logout-btn { margin-top: auto; background-color: #ef4444; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .logout-btn:hover { background-color: #dc2626; }
        .main-content { flex: 1; padding: 30px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .user-info h1 { font-size: 24px; color: #0f172a; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .card h3 { color: #64748b; font-size: 14px; text-transform: uppercase; margin-bottom: 10px; }
        .card p { font-size: 28px; font-weight: bold; color: #0f172a; }
    </style>

    <!-- MEMUAT SDK FIREBASE KARENA ANDA MENGGUNAKAN FIREBASE -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>
</head>
<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>Aplikasi Saya</h2>
        <a href="#" class="active">🏠 Dashboard</a>
        <a href="#">👤 Profil</a>
        <a href="#">⚙️ Pengaturan</a>
        <button class="logout-btn" onclick="logoutUser()">🚪 Keluar</button>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="header">
            <div class="user-info">
                <h1>Selamat Datang, <span id="user-display-name">Memuat nama...</span>!</h1>
                <p id="user-display-email">Memuat email...</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="card">
                <h3>Status Sesi Firebase</h3>
                <p style="color: #22c55e; font-size: 20px;">Terhubung</p>
            </div>
            <div class="card">
                <h3>Metode Login</h3>
                <p id="auth-method" style="font-size: 18px; color: #64748b;">Mengecek...</p>
            </div>
            <div class="card">
                <h3>Notifikasi</h3>
                <p>0</p>
            </div>
        </div>
    </div>

    <script>
        // Konfigurasi Firebase milik aplikasi Anda
        const firebaseConfig = {
            apiKey: "AIzaSyDg2b6LERZ2zE86mTiYvUO1Uj--lAtpmgM",
            authDomain: "afatsumazer-app.firebaseapp.com",
            databaseURL: "https://afatsumazer-app-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "afatsumazer-app",
            storageBucket: "afatsumazer-app.firebasestorage.app",
            messagingSenderId: "16280759060",
            appId: "1:16280759060:web:fd4deacafdf5cadd777001",
            measurementId: "G-WB9YW9D726"
        };

        // Inisialisasi Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Pantau Status Login secara Real-Time (Sinkron otomatis dengan login/signup)
        auth.onAuthStateChanged((user) => {
            if (user) {
                // Jika pengguna terdeteksi masuk lewat Firebase Auth
                document.getElementById('user-display-name').innerText = user.displayName || "Pengguna";
                document.getElementById('user-display-email').innerText = user.email;
                
                // Menampilkan metode login (misal: password atau google.com)
                const provider = user.providerData[0]?.providerId || "Email/Password";
                document.getElementById('auth-method').innerText = provider;
            } else {
                // Jika tidak ada user yang login aktif di Firebase, tendang ke login.html
                alert('Sesi habis atau belum login. Silakan login kembali.');
                window.location.href = 'login.html'; 
            }
        });

        // Fungsi Keluar / Logout resmi Firebase
        function logoutUser() {
            auth.signOut().then(() => {
                window.location.href = 'login.html';
            }).catch((error) => {
                console.error("Gagal logout:", error);
            });
        }
    </script>
</body>
</html>
