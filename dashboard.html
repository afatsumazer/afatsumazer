<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - AFATSUMAZER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { display: flex; min-height: 100vh; background-color: #f4f6f9; }
        
        /* Navigasi Panel Samping */
        .sidebar { width: 250px; background-color: #1e293b; color: #fff; padding: 25px 20px; display: flex; flex-direction: column; }
        .sidebar h2 { font-size: 22px; margin-bottom: 30px; text-align: center; color: #38bdf8; letter-spacing: 1px; }
        .sidebar a { color: #cbd5e1; text-decoration: none; padding: 12px; display: block; border-radius: 8px; margin-bottom: 10px; font-weight: 500; }
        .sidebar a.active { background-color: #334155; color: #fff; }
        .logout-btn { margin-top: auto; background-color: #ef4444; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .logout-btn:hover { background-color: #dc2626; }
        
        /* Area Konten Utama */
        .main-content { flex: 1; padding: 30px; }
        .header { background: #fff; padding: 20px 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .user-info h1 { font-size: 24px; color: #0f172a; margin-bottom: 5px; }
        .user-info p { color: #64748b; font-size: 14px; }
        
        /* Statistik Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-top: 25px; }
        .card { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .card h3 { color: #64748b; font-size: 13px; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 0.5px; }
        .card p { font-size: 24px; font-weight: bold; color: #0f172a; }
    </style>
</head>
<body>

    <!-- Panel Samping (Sidebar) -->
    <div class="sidebar">
        <h2>AFATSUMAZER</h2>
        <a href="#" class="active">🏠 Dashboard</a>
        <a href="#">💼 Cari Projek</a>
        <a href="#">📩 Pesan</a>
        <button class="logout-btn" id="logoutBtn">🚪 Keluar</button>
    </div>

    <!-- Konten Utama -->
    <div class="main-content">
        <div class="header">
            <div class="user-info">
                <h1>Selamat Datang, <span id="userName">Memuat...</span>!</h1>
                <p id="userEmail">Memuat akun...</p>
            </div>
        </div>

        <!-- Kartu Monitor Sederhana -->
        <div class="grid">
            <div class="card">
                <h3>Status Verifikasi</h3>
                <p style="color: #22c55e; font-size: 18px;">Terverifikasi Berjalan</p>
            </div>
            <div class="card">
                <h3>Projek Aktif</h3>
                <p>0</p>
            </div>
            <div class="card">
                <h3>Total Pendapatan</h3>
                <p>Rp 0</p>
            </div>
        </div>
    </div>

    <!-- KONTROL KEAMANAN DAN SYNC REALTIME -->
    <script type="module">
        import { auth } from "./js/firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://gstatic.com";

        // Memantau kondisi login secara presisi di pelayan web
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Tampilkan data profil asli dari database akun Firebase
                document.getElementById('userName').innerText = user.displayName || "Freelancer";
                document.getElementById('userEmail').innerText = user.email;
            } else {
                // Jika tidak terdeteksi token login, langsung lempar kembali ke gerbang login
                window.location.href = 'login.html';
            }
        });

        // Event handler klik untuk fungsi keluar log keamanan
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
