<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AFATSUMAZER</title>

<meta name="theme-color" content="#0d6efd">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#05070d;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:#fff;
}

.container{
text-align:center;
animation:fadeIn 1.2s;
}

.logo{
width:130px;
height:130px;
border-radius:50%;
background:#111;
border:4px solid #1d9bf0;
display:flex;
justify-content:center;
align-items:center;
margin:auto;
box-shadow:0 0 30px #1d9bf0;
font-size:55px;
font-weight:bold;
}

.logo span{
color:#1d9bf0;
}

h1{
margin-top:25px;
font-size:28px;
letter-spacing:2px;
}

p{
margin-top:10px;
color:#aaa;
}

.loader{
margin:35px auto 0;
width:70px;
height:70px;
border-radius:50%;
border:5px solid rgba(255,255,255,.15);
border-top:5px solid #1d9bf0;
animation:spin 1s linear infinite;
}

.version{
position:fixed;
bottom:20px;
width:100%;
text-align:center;
font-size:13px;
color:#666;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

@keyframes fadeIn{
from{opacity:0;transform:scale(.9);}
to{opacity:1;transform:scale(1);}
}
</style>

</head>

<body>

<div class="container">

<div class="logo">
<span>A</span>
</div>

<h1>AFATSUMAZER</h1>

<p>Loading...</p>

<div class="loader"></div>

</div>

<div class="version">
Version 1.0.0
</div>

<script>

// Nanti diganti dengan Firebase Authentication

setTimeout(function(){

const login=localStorage.getItem("login");

if(login=="true"){
window.location.href="dashboard.html";
}else{
window.location.href="login.html";
}

},2500);

</script>

</body>
</html>
