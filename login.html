<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AFATSUMAZER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { width: 380px; background: white; padding: 35px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,.25); }
        .logo { text-align: center; font-size: 30px; font-weight: bold; margin-bottom: 10px; color: #2563eb; }
        .subtitle { text-align: center; margin-bottom: 25px; color: #666; font-size: 14px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .input-group input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #2563eb; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        button:hover { background: #1d4ed8; }
        .links { margin-top: 20px; text-align: center; font-size: 14px; }
        .links a { text-decoration: none; color: #2563eb; }
        .error { margin-top: 10px; text-align: center; color: red; font-size: 14px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">AFATSUMAZER</div>
        <div class="subtitle">Platform Freelancer Indonesia</div>
        
        <form id="loginForm">
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="Masukkan email" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Masukkan password" required>
            </div>
            <button type="submit">Masuk</button>
        </form>

        <div class="error" id="errorMsg"></div>
        <div class="links">Belum punya akun? <a href="register.html">Daftar sekarang</a></div>
    </div>

    <script type="module" src="js/login.js"></script>
</body>
</html>
