<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - AFATSUMAZER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(180deg,#05070d,#0d1b2a);

padding:20px;

}

.card{

width:100%;

max-width:400px;

background:rgba(255,255,255,.05);

backdrop-filter:blur(15px);

border-radius:25px;

padding:30px;

box-shadow:0 0 30px rgba(0,140,255,.4);

border:1px solid rgba(255,255,255,.1);

}

.logo{

width:90px;

height:90px;

border-radius:50%;

background:#0d6efd;

display:flex;

justify-content:center;

align-items:center;

margin:auto;

font-size:42px;

font-weight:bold;

color:white;

box-shadow:0 0 20px #0d6efd;

margin-bottom:20px;

}

h2{

text-align:center;

color:white;

margin-bottom:25px;

}

.input{

margin-bottom:18px;

}

.input label{

display:block;

margin-bottom:8px;

color:#ddd;

font-size:14px;

}

.input input{

width:100%;

padding:14px;

border:none;

outline:none;

border-radius:12px;

font-size:15px;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:14px;

background:#0d6efd;

color:white;

font-size:16px;

font-weight:bold;

cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.02);

}

.bottom{

margin-top:20px;

text-align:center;

color:#ccc;

font-size:14px;

}

.bottom a{

color:#4db8ff;

text-decoration:none;

font-weight:bold;

}

.version{

margin-top:20px;

text-align:center;

font-size:12px;

color:#777;

}

</style>

</head>

<body>

<div class="card">

<div class="logo">
A
</div>

<h2>AFATSUMAZER</h2>

<form id="loginForm">

<div class="input">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Masukkan Email"
required>

</div>

<div class="input">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Masukkan Password"
required>

</div>

<button type="submit">

LOGIN

</button>

</form>

<div class="bottom">

Belum punya akun?

<br><br>

<a href="register.html">

Daftar Sekarang

</a>

</div>

<div class="version">

AFATSUMAZER APP v1.0

</div>

</div>

<script type="module" src="assets/js/login.js"></script>

</body>
</html>
