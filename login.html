<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - AFATSUMAZER</title>

<link rel="stylesheet" href="css/style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{

width:380px;

background:white;

padding:35px;

border-radius:15px;

box-shadow:0 10px 25px rgba(0,0,0,.25);

}

.logo{

text-align:center;

font-size:30px;

font-weight:bold;

margin-bottom:10px;

color:#2563eb;

}

.subtitle{

text-align:center;

margin-bottom:30px;

color:#666;

}

.input-group{

margin-bottom:20px;

}

.input-group label{

display:block;

margin-bottom:8px;

font-weight:bold;

}

.input-group input{

width:100%;

padding:14px;

border:1px solid #ddd;

border-radius:8px;

font-size:15px;

}

button{

width:100%;

padding:15px;

background:#2563eb;

color:white;

border:none;

border-radius:8px;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#1d4ed8;

}

.links{

margin-top:20px;

text-align:center;

}

.links a{

text-decoration:none;

color:#2563eb;

}

.error{

margin-top:15px;

text-align:center;

color:red;

font-size:14px;

}

.loading{

display:none;

text-align:center;

margin-top:15px;

color:#2563eb;

}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">

AFATSUMAZER

</div>

<div class="subtitle">

Platform Freelancer Indonesia

</div>

<form id="loginForm">

<div class="input-group">

<label>Email</label>

<input
type="email"
id="email"
placeholder="Masukkan email"
required>

</div>

<div class="input-group">

<label>Password</label>

<input
type="password"
id="password"
placeholder="Masukkan password"
required>

</div>

<button type="submit">

Masuk

</button>

</form>

<div class="loading" id="loading">

Sedang login...

</div>

<div class="error" id="error"></div>

<div class="links">

Belum punya akun?

<a href="register.html">

Daftar

</a>

<br><br>

<a href="index.html">

← Kembali ke Beranda

</a>

</div>

</div>

<script type="module" src="js/login.js"></script>

</body>
</html>
