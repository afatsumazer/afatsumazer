<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>AFATSUMAZER</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#08111f;
color:white;
padding-bottom:80px;
}

.header{

background:linear-gradient(90deg,#0066ff,#00bfff);

padding:25px;

border-radius:0 0 25px 25px;

}

.user{

display:flex;

align-items:center;

}

.avatar{

width:65px;

height:65px;

border-radius:50%;

background:white;

color:#0066ff;

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

font-weight:bold;

margin-right:15px;

}

.card{

background:#111d33;

margin:15px;

padding:18px;

border-radius:18px;

box-shadow:0 0 15px rgba(0,150,255,.3);

}

.point{

font-size:32px;

font-weight:bold;

color:#00d4ff;

}

.energy{

margin-top:15px;

height:10px;

background:#333;

border-radius:20px;

overflow:hidden;

}

.energy div{

width:100%;

height:100%;

background:#00ff88;

}

.mine{

margin:20px;

padding:18px;

text-align:center;

background:#0066ff;

border-radius:20px;

font-size:22px;

font-weight:bold;

cursor:pointer;

box-shadow:0 0 20px #008cff;

}

.mine:active{

transform:scale(.98);

}

.grid{

display:grid;

grid-template-columns:repeat(2,1fr);

gap:15px;

padding:15px;

}

.menu{

background:#111d33;

padding:25px;

border-radius:18px;

text-align:center;

font-size:18px;

}

.bottom{

position:fixed;

bottom:0;

left:0;

width:100%;

height:70px;

background:#101827;

display:flex;

justify-content:space-around;

align-items:center;

}

.bottom div{

text-align:center;

font-size:13px;

}

a{

color:white;

text-decoration:none;

}

</style>

</head>

<body>

<div class="header">

<div class="user">

<div class="avatar">A</div>

<div>

<h2>Reza</h2>

Level 1

</div>

</div>

</div>

<div class="card">

Total Point

<div class="point" id="point">

0

</div>

<div class="energy">

<div></div>

</div>

Energi 100%

</div>

<div class="mine"

onclick="mine()">

⛏️ START MINING

</div>

<div class="grid">

<div class="menu">

🎁

<br><br>

Reward

</div>

<div class="menu">

🏆

<br><br>

Leaderboard

</div>

<div class="menu">

📰

<br><br>

News

</div>

<div class="menu">

⚙️

<br><br>

Setting

</div>

</div>

<div class="bottom">

<div>

🏠

<br>

Home

</div>

<div>

⛏️

<br>

Mining

</div>

<div>

🎁

<br>

Reward

</div>

<div>

👤

<br>

Profile

</div>

</div>

<script>

let point=0;

function mine(){

point+=10;

document.getElementById("point").innerHTML=point;

alert("+10 Point");

}

</script>

</body>

</html>
